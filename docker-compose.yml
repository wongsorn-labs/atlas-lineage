services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas_lineage_db
    environment:
      POSTGRES_DB: atlas_lineage
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev_password
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data

volumes:
  atlas_postgres_data:
