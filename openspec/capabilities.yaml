# Capability status tracker for Atlas Lineage.
#
# Mirrors openspec/specs/<capability>/spec.md but adds an implementation
# status that OpenSpec itself doesn't track. Update this file as part of
# `openspec archive` whenever a capability is added or its status changes
# (see the "Spec-Driven Development (OpenSpec)" section in CLAUDE.md).
#
# status values: implemented | gap | in-progress | planned

updated: 2026-07-04

capabilities:
  - name: person-management
    spec: specs/person-management/spec.md
    requirements: 5
    status: implemented

  - name: relationship-management
    spec: specs/relationship-management/spec.md
    requirements: 4
    status: implemented

  - name: field-encryption
    spec: specs/field-encryption/spec.md
    requirements: 4
    status: implemented

  - name: map-visualization
    spec: specs/map-visualization/spec.md
    requirements: 4
    status: implemented
    notes: >-
      react-leaflet@4.2.1 doesn't officially support React 19 and crashes
      MapContainer under React StrictMode's dev-mode double-invoke ("Map
      container is already initialized"). Worked around by dropping
      StrictMode app-wide in main.tsx; the proper fix is upgrading
      react-leaflet to a React 19-compatible release and re-enabling it.
    issues:
      - https://github.com/wongsorn-labs/atlas-lineage/issues/12

  - name: authentication
    spec: specs/authentication/spec.md
    requirements: 7
    status: implemented

  - name: localization
    spec: specs/localization/spec.md
    requirements: 2
    status: implemented

  - name: pwa-support
    spec: specs/pwa-support/spec.md
    requirements: 3
    status: implemented

  - name: family-tree-management
    spec: specs/family-tree-management/spec.md
    requirements: 5
    status: implemented
    notes: >-
      TreeMemberGuard + @RequireRoles(...) are now applied to
      PersonsController, RelationshipsController, and the
      POST /trees/:treeId/members endpoint. persons/relationships queries are
      scoped by treeId (see the "Role Hierarchy Is Enforced On Data
      Endpoints" requirement). The web frontend does not yet send a treeId
      on these requests (no tree-selection UI exists), so it needs a
      follow-up before it works against this API again.
